# ────────────────────────────────────────────────────────────────
#  每日要聞自動推送  ·  GitHub Actions
#  觸發時間：每天 GMT 00:00（香港時間 08:00）
#  手動觸發：Actions 頁面 → Run workflow
# ────────────────────────────────────────────────────────────────
name: Daily News Digest

on:
  schedule:
    - cron: "0 0 * * *"   # GMT 00:00 = 香港早上 8 點
  workflow_dispatch:       # 允許手動觸發（測試用）

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install feedparser requests google-generativeai

      - name: Run digest
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python digest.py
